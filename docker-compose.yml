services:
  postgres:
    image: postgres:16-alpine
    container_name: leontief-postgres
    environment:
      POSTGRES_USER: leontief
      POSTGRES_PASSWORD: leontief
      POSTGRES_DB: leontief
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U leontief -d leontief"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
