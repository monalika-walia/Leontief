# Render Blueprint (infrastructure-as-code) — the Leontief backend API + Postgres.
# Deploy: Render Dashboard → New → Blueprint → point at this repo, OR via the
# Render MCP/CLI in an interactive session. Free plan; DATABASE_URL is injected
# from the managed Postgres, the migration runs pre-deploy.
services:
  - type: web
    name: leontief-api
    runtime: node
    plan: free
    rootDir: .
    # pnpm monorepo — Render's global node_modules is read-only, so both
    # `corepack enable` and `npm i -g pnpm` fail (EROFS). Use npx (writable
    # cache). The API self-migrates on startup, so no separate pre-deploy step.
    buildCommand: npx --yes pnpm@10.32.1 install --frozen-lockfile
    startCommand: npx --yes tsx services/api/src/server.ts
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: leontief-db
          property: connectionString
      - key: PORT
        value: 8787
      # Allow the deployed landing + dApp origins to POST the early-access form.
      - key: CORS_ORIGINS
        value: https://leontief-landing.vercel.app,https://leontief-app.vercel.app
      - key: IP_HASH_SALT
        generateValue: true
      - key: NODE_VERSION
        value: "22"

databases:
  - name: leontief-db
    plan: free
    postgresMajorVersion: "16"
