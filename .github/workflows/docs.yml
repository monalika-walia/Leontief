name: Docs site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

env:
  MDBOOK_VERSION: v0.5.4
  MDBOOK_MERMAID_VERSION: v0.17.0

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdbook + mdbook-mermaid (prebuilt)
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -fsSL "https://github.com/rust-lang/mdBook/releases/download/${MDBOOK_VERSION}/mdbook-${MDBOOK_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C "$HOME/.local/bin"
          curl -fsSL "https://github.com/badboy/mdbook-mermaid/releases/download/${MDBOOK_MERMAID_VERSION}/mdbook-mermaid-${MDBOOK_MERMAID_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build book (fails on broken includes)
        run: mdbook build docs-site
      - name: Link check (internal links of the built site)
        uses: lycheeverse/lychee-action@v2
        with:
          # 404.html is mdBook boilerplate whose home link is root-relative
          # (/Leontief/) and unresolvable offline — everything else is checked.
          args: --offline --no-progress --include-fragments --exclude-path docs-site/book/404.html "docs-site/book/**/*.html"
          fail: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/book

  # Best-effort: `build` (above) is the real gate — it proves the docs compile
  # and every internal link resolves. Publishing needs GitHub Pages enabled with
  # Source = "GitHub Actions" (repo Settings → Pages), a one-time owner action
  # the default Actions token can't perform. Until then this job soft-fails and
  # the workflow stays green on the meaningful check; once Pages is enabled it
  # deploys automatically on the next push.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    continue-on-error: true
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      - id: deployment
        uses: actions/deploy-pages@v4
