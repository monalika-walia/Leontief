name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  STELLAR_CLI_VERSION: 27.0.0

jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Build vault wasm (factory test target imports it)
        run: cargo build --package vault --target wasm32v1-none --release
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Build vault wasm (factory tests deploy it)
        run: cargo build --package vault --target wasm32v1-none --release
      - run: cargo test --workspace --all-targets

  coverage:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov
      - name: Coverage gate ≥90% lines (vault + mini-pool)
        run: cargo llvm-cov --package vault --package mini-pool --fail-under-lines 90 --html
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-html
          path: target/llvm-cov/html
          if-no-files-found: error

  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - name: Install stellar-cli (prebuilt)
        run: |
          curl -fsSL "https://github.com/stellar/stellar-cli/releases/download/v${STELLAR_CLI_VERSION}/stellar-cli-${STELLAR_CLI_VERSION}-x86_64-unknown-linux-gnu.tar.gz" \
            | tar xz -C /usr/local/bin
          stellar --version
      - name: Build + optimize every contract
        run: |
          mkdir -p target/wasm
          for c in vault vault-factory oracle-adapter mock-oracle mini-pool blend-price-adapter reflector-feed; do
            stellar contract build --package "$c"
          done
          for f in target/wasm32v1-none/release/*.wasm; do
            stellar contract optimize --wasm "$f" --wasm-out "target/wasm/$(basename "$f")"
          done
          (cd target/wasm && sha256sum *.wasm | tee SHA256SUMS)
      - uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: |
            target/wasm/*.wasm
            target/wasm/SHA256SUMS
          if-no-files-found: error

  js:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm -r test

  deployments:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate address registries + ADDRESSES.md is up to date
        run: |
          python3 scripts/validate_deployments.py
          ./scripts/gen_addresses.sh
          git diff --exit-code docs/ADDRESSES.md \
            || { echo "docs/ADDRESSES.md is stale — run 'just docs' and commit"; exit 1; }
